<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,sans-serif;background:#0f0f0f;color:#e5e5e5;
  padding:16px;font-size:14px;min-height:100vh;}
h1{font-size:1.15rem;margin-bottom:4px;color:#fff;}
p{font-size:.8rem;color:#888;margin-bottom:16px;}
textarea{width:100%;background:#111;border:1px solid #333;border-radius:8px;
  padding:10px;color:#e5e5e5;font-size:.75rem;font-family:monospace;
  resize:none;height:70px;outline:none;}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:8px;
  font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px;color:#fff;}
.bp{background:#7c3aed;} .bg{background:#15803d;} .br{background:#991b1b;}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;
  padding:14px;margin-bottom:12px;}
.row{display:flex;gap:8px;align-items:flex-start;padding:8px 0;
  border-bottom:1px solid #1f1f1f;}
.row:last-child{border-bottom:none;}
.ico{font-size:1.1rem;min-width:22px;}
.title{font-size:.85rem;font-weight:600;}
.detail{font-size:.75rem;color:#9ca3af;margin-top:3px;line-height:1.5;word-break:break-all;}
.ok .title{color:#4ade80;} .err .title{color:#f87171;}
.warn .title{color:#fbbf24;} .pend .title{color:#6b7280;}
.mono{background:#0a0a0a;border:1px solid #222;border-radius:6px;
  padding:8px;font-family:monospace;font-size:.68rem;word-break:break-all;
  white-space:pre-wrap;max-height:140px;overflow-y:auto;margin-top:6px;color:#a3a3a3;}
#copyArea{width:100%;height:80px;background:#111;border:1px solid #333;
  border-radius:8px;padding:8px;color:#e5e5e5;font-size:.7rem;
  font-family:monospace;margin-top:8px;display:none;}
</style>
</head>
<body>

<h1>🔍 Diagnóstico</h1>
<p>Pega la URL completa de Apps Script y presiona el botón</p>

<div class="card">
  <textarea id="urlInput" autocomplete="off" autocorrect="off"
    autocapitalize="none" spellcheck="false"
    placeholder="https://script.google.com/macros/s/AKfy.../exec"></textarea>
  <button class="btn bp" onclick="startDiag()">🔍 Diagnosticar</button>
</div>

<div id="logDiv" style="display:none">
  <div class="card" id="steps"></div>
  <div class="card" id="rawCard" style="display:none">
    <div style="font-size:.72rem;color:#888;margin-bottom:5px">RESPUESTA DEL SERVIDOR:</div>
    <div class="mono" id="rawBox"></div>
  </div>
  <button class="btn bg" id="copyBtn" onclick="copyReport()" style="display:none">
    📋 COPIAR REPORTE — pégalo en Claude
  </button>
  <textarea id="copyArea" readonly></textarea>
</div>

<script>
var lines = [];
var stepsEl = null;

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addRow(id, ico, cls, title, detail, mono){
  if(!stepsEl) stepsEl = document.getElementById('steps');
  var inner = '<div class="ico">'+ico+'</div><div>'
    +'<div class="title">'+title+'</div>'
    +(detail ? '<div class="detail">'+detail+'</div>' : '')
    +(mono   ? '<div class="mono">'+esc(String(mono).slice(0,500))+'</div>' : '')
    +'</div>';
  var existing = document.getElementById('sr'+id);
  if(existing){
    existing.className = 'row '+cls;
    existing.innerHTML = inner;
  } else {
    var d = document.createElement('div');
    d.id = 'sr'+id;
    d.className = 'row '+cls;
    d.innerHTML = inner;
    stepsEl.appendChild(d);
  }
}

function log(msg){ lines.push(msg); }

function startDiag(){
  lines = [];
  stepsEl = null;
  document.getElementById('steps').innerHTML = '';
  document.getElementById('logDiv').style.display = '';
  document.getElementById('copyBtn').style.display = 'none';
  document.getElementById('rawCard').style.display = 'none';
  document.getElementById('copyArea').style.display = 'none';

  addRow('init','⏳','pend','Iniciando diagnóstico…','');
  log('=== REPORTE DIAGNÓSTICO ===');
  log('Fecha: '+new Date().toLocaleString('es-MX'));
  log('Online: '+navigator.onLine);
  log('UA: '+navigator.userAgent);
  log('');

  // Leer y limpiar URL
  var raw = document.getElementById('urlInput').value || '';
  var url = raw.replace(/[\r\n\t\u00A0\u200B-\u200D\uFEFF]/g,'').trim();

  log('URL raw ('+raw.length+'): '+raw);
  log('URL clean ('+url.length+'): '+url);

  addRow('dev','📱','pend',
    'Dispositivo',
    'Online: '+(navigator.onLine?'✅ Sí':'❌ Sin internet')+
    '<br>'+esc(navigator.userAgent.slice(0,80)));
  log('[DEV] online='+navigator.onLine);

  // Validar URL
  if(!url){
    addRow('p1','❌','err','URL vacía','Pega la URL en el campo de texto.');
    log('[P1] FAIL: vacía'); finish(''); return;
  }
  if(!url.startsWith('https://script.google.com')){
    addRow('p1','❌','err','URL incorrecta',
      'Debe empezar con https://script.google.com<br>Tienes: '+esc(url.slice(0,80)));
    log('[P1] FAIL: no script.google.com'); finish(''); return;
  }
  var diff = raw.length - url.length;
  if(diff > 0){
    addRow('p1','⚠️','warn','Se quitaron '+diff+' char(s) invisible(s)',
      'Normal al pegar en iOS. La URL ya quedó limpia.');
    log('[P1] WARN: '+diff+' chars invisibles');
  } else {
    addRow('p1','✅','ok','URL con formato correcto',esc(url.slice(0,60))+'…');
    log('[P1] OK');
  }

  // Conectar con XHR (más compatible que fetch en iOS)
  addRow('p2','⏳','pend','Conectando… (espera hasta 15s)','Usando XMLHttpRequest');
  log('[P2] iniciando XHR a: '+url+'?action=load');

  var xhr = new XMLHttpRequest();
  var t0 = Date.now();

  xhr.onload = function(){
    var ms = Date.now()-t0;
    var st = xhr.status;
    var body = xhr.responseText || '';
    log('[P2] XHR onload status='+st+' ms='+ms+' len='+body.length);
    log('[P2] primeros 300 chars: '+body.slice(0,300));
    addRow('p2','✅','ok','Servidor respondió ('+ms+'ms)','HTTP '+st+' — '+body.length+' bytes');
    analizarRespuesta(st, body);
  };

  xhr.onerror = function(){
    var ms = Date.now()-t0;
    log('[P2] XHR onerror ms='+ms);
    addRow('p2','❌','err','Error de red',
      'El celular no pudo llegar al servidor.<br>'
      +'Causas:<br>'
      +'• Sin internet<br>'
      +'• El navegador bloqueó la conexión (CORS en iOS Safari)<br>'
      +'• URL incorrecta');
    addRow('res','🚫','err','CAUSA: Error de red / CORS',
      'Intenta abrir esta URL directamente en Safari:<br>'+esc(url)+'?action=load');
    log('[P2] FAIL: onerror'); finish('');
  };

  xhr.ontimeout = function(){
    log('[P2] XHR timeout 15s');
    addRow('p2','❌','err','Tiempo agotado (15s)',
      'El servidor no respondió en 15 segundos.');
    finish('');
  };

  xhr.timeout = 15000;
  try{
    xhr.open('GET', url+'?action=load', true);
    xhr.send();
    log('[P2] XHR enviado');
  } catch(e){
    log('[P2] xhr.open/send exception: '+e.message);
    addRow('p2','❌','err','Excepción al conectar',e.message);
    finish('');
  }
}

function analizarRespuesta(status, body){
  var trimmed = (body||'').trim();
  log('[P3] analizando body tipo='+(trimmed[0]==='{' ? 'JSON' : 'HTML/otro'));

  if(trimmed.charAt(0) === '{'){
    var data;
    try{ data = JSON.parse(body); }
    catch(e){
      addRow('p3','❌','err','JSON inválido',e.message, body.slice(0,300));
      log('[P3] FAIL JSON parse: '+e.message);
      finish(body); return;
    }
    if(data.success === true){
      var a = (data.students||[]).length;
      var t = Object.keys(data.totals||{}).length;
      var c = Object.keys(data.raw||{}).length;
      var esc2 = (data.config&&data.config.schoolName)||'(sin nombre)';
      addRow('p3','✅','ok','JSON correcto — success: true',
        '🏫 '+esc(esc2)+'<br>👥 '+a+' alumno(s)<br>🎯 '+t+' totales<br>📝 '+c+' califs');
      addRow('res','🎉','ok','✅ EL SERVIDOR FUNCIONA BIEN',
        'La conexión es correcta. Si en la app da error, el problema es cómo se guarda la URL en el dispositivo.');
      log('[P3] OK success:true alumnos='+a);
    } else {
      addRow('p3','❌','err','success: false',
        'Error del servidor: '+esc(data.error||'desconocido'), body.slice(0,300));
      log('[P3] FAIL success:false error='+data.error);
    }

  } else if(trimmed.indexOf('accounts.google.com')>=0 || trimmed.indexOf('ServiceLogin')>=0 || trimmed.indexOf('google.com/accounts')>=0){
    addRow('p3','🔐','err','Google pide inicio de sesión — ESTE ES EL PROBLEMA',
      '<b>El Apps Script NO tiene acceso anónimo.</b><br><br>'
      +'Pasos para corregir (en la PC):<br>'
      +'1. script.google.com<br>'
      +'2. Implementar → Administrar implementaciones<br>'
      +'3. ✏️ Editar → "Quién tiene acceso":<br>'
      +'   → <b>Cualquier usuario, incluso anónimo</b><br>'
      +'4. Nueva versión → Actualizar');
    addRow('res','🔐','err','CAUSA: El deployment no es público','Cambiar acceso en Apps Script.');
    log('[P3] FAIL: Google login redirect');

  } else {
    addRow('p3','⚠️','warn','Respuesta inesperada HTTP '+status,
      'No es JSON ni login de Google.', body.slice(0,300));
    log('[P3] WARN: inesperado HTTP='+status+' body='+body.slice(0,100));
  }

  finish(body);
}

function finish(body){
  if(body && body.length > 0){
    document.getElementById('rawCard').style.display = '';
    document.getElementById('rawBox').textContent =
      body.slice(0,600)+(body.length>600?'\n…('+body.length+' chars total)':'');
  }
  log('');
  log('=== FIN DEL REPORTE ===');
  document.getElementById('copyBtn').style.display = 'block';
}

function copyReport(){
  var text = lines.join('\n');
  var ta = document.getElementById('copyArea');
  ta.value = text;
  ta.style.display = 'block';
  ta.select();
  try{ document.execCommand('copy'); } catch(e){}
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(function(){});
  }
  document.getElementById('copyBtn').textContent = '✅ Copiado — ahora pégalo en Claude';
}
</script>
</body>
</html>
