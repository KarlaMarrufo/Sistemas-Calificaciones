  <script>
  // ── Genera el ícono de la app con Canvas (sin archivos externos) ──
  function makeIcon(size) {
    const c = document.createElement("canvas");
    c.width = c.height = size;
    const ctx = c.getContext("2d");
    const r = size * 0.18;

    // Fondo degradado azul oscuro
    const grad = ctx.createLinearGradient(0, 0, size, size);
    grad.addColorStop(0, "#1a1a4e");
    grad.addColorStop(1, "#0d0d2e");
    ctx.fillStyle = grad;
    // Rounded rect
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(size-r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size-r);
    ctx.quadraticCurveTo(size, size, size-r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size-r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fill();

    // Brillo superior
    const shine = ctx.createLinearGradient(0, 0, 0, size*0.5);
    shine.addColorStop(0, "rgba(255,255,255,0.10)");
    shine.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = shine;
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(size-r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size*0.5);
    ctx.lineTo(0, size*0.5);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fill();

    // Círculo acento azul
    ctx.beginPath();
    ctx.arc(size/2, size*0.42, size*0.30, 0, Math.PI*2);
    ctx.fillStyle = "#4361ee22";
    ctx.fill();
    ctx.strokeStyle = "#4361ee66";
    ctx.lineWidth = size * 0.025;
    ctx.stroke();

    // Emoji 🏫 centrado
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = `${size * 0.40}px serif`;
    ctx.fillText("🏫", size/2, size * 0.42);

    // Texto "CAL" abajo
    ctx.font = `bold ${size * 0.13}px 'Segoe UI', sans-serif`;
    ctx.fillStyle = "#a0a8ff";
    ctx.letterSpacing = size * 0.01 + "px";
    ctx.fillText("CALIFICACIONES", size/2, size * 0.80);

    // Línea decorativa
    ctx.strokeStyle = "#4361ee88";
    ctx.lineWidth = size * 0.012;
    ctx.beginPath();
    ctx.moveTo(size*0.20, size*0.70);
    ctx.lineTo(size*0.80, size*0.70);
    ctx.stroke();

    return c.toDataURL("image/png");
  }

  // Inyectar iconos y manifest cuando el DOM esté listo
  window.addEventListener("DOMContentLoaded", () => {
    try {
      const icon192 = makeIcon(192);
      const icon512 = makeIcon(512);
      const icon180 = makeIcon(180);

      // apple-touch-icon (iOS)
      document.getElementById("apple-touch-icon").href = icon180;
      // favicon
      document.getElementById("favicon").href = icon192;

      // Web App Manifest
      const manifest = {
        name: "Sistema de Calificaciones",
        short_name: "Calificaciones",
        description: "Sistema de gestión de calificaciones escolares",
        start_url: "./",
        display: "standalone",
        orientation: "portrait-primary",
        background_color: "#0d0d1a",
        theme_color: "#0d0d1a",
        lang: "es",
        icons: [
          { src: icon192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
          { src: icon512, sizes: "512x512", type: "image/png", purpose: "any maskable" },
        ]
      };
      const blob = new Blob([JSON.stringify(manifest)], {type:"application/json"});
      document.getElementById("manifest-link").href = URL.createObjectURL(blob);
    } catch(e) { console.warn("PWA setup:", e); }
  });

  // ── Service Worker (cache offline) ──
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      const swCode = `
        const CACHE = "calificaciones-v2";
        const URLS  = [self.registration.scope];
        self.addEventListener("install",  e => { e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS))); self.skipWaiting(); });
        self.addEventListener("activate", e => { e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k))))); self.clients.claim(); });
        self.addEventListener("fetch", e => {
          e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
        });
      `;
      const swBlob = new Blob([swCode], {type:"text/javascript"});
      navigator.serviceWorker.register(URL.createObjectURL(swBlob))
        .catch(()=>{});
    });
  }
  </script>

      }

      }

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ── Constants ───────────────────────────────────────────────── */
const SUBJECTS  = ["Lenguajes","Saberes","Ética","Humano"];
const CRITERIA  = ["tareas","trabajos","disciplina","examen"];
const C_LABELS  = { tareas:"Tareas", trabajos:"Trabajos", disciplina:"Disciplina", examen:"Examen" };
const C_ICONS   = { tareas:"📋", trabajos:"📝", disciplina:"🎯", examen:"📊" };
// Tipo de cada criterio: cantidad | pct_directo | reactivos
const CRIT_TYPE = { tareas:"cantidad", trabajos:"cantidad", disciplina:"pct_directo", examen:"reactivos" };
const CRIT_TYPE_LABEL = {
  cantidad:    { short:"cant.", hint:"Cantidad total a completar", inputLabel:"piezas" },
  pct_directo: { short:"% dir.", hint:"La maestra asigna el porcentaje directamente", inputLabel:"%" },
  reactivos:   { short:"rcts.", hint:"Total de reactivos del examen", inputLabel:"rcts" },
};
const SUB_COLOR = {
  Lenguajes:{ bg:"#1e3a5f", accent:"#4dabf7", light:"#d0ebff" },
  Saberes:  { bg:"#1e472a", accent:"#51cf66", light:"#d3f9d8" },
  Ética:    { bg:"#3d1f5a", accent:"#cc5de8", light:"#f3d9fa" },
  Humano:   { bg:"#5a3a1a", accent:"#fd7e14", light:"#ffe8cc" },
};
const DEF_W = { tareas:20, trabajos:20, disciplina:20, examen:40 };
const uid   = () => Math.random().toString(36).slice(2,10);

/* ── Auth ────────────────────────────────────────────────────── */
// Simple hash (djb2) — suficiente para cliente sin servidor
function hashStr(s) {
  let h=5381; for(let i=0;i<s.length;i++) h=((h<<5)+h)+s.charCodeAt(i)|0;
  return (h>>>0).toString(16);
}

// Usuarios por defecto — Master Admin puede cambiarlos desde el sistema
const DEFAULT_USERS = [
  { id:"u1", username:"karlamarrufo", passHash: hashStr("Karla2026"), role:"docente",      name:"Karla Marrufo",  active:true },
  { id:"u2", username:"edelchavez",   passHash: hashStr("Edel2026"),  role:"masteradmin",  name:"Edel Chávez",    active:true },
];

const ROLE_LABELS = { docente:"Docente", masteradmin:"Master Admin" };
const ROLE_COLORS = { docente:"#4dabf7", masteradmin:"#ffd43b" };
const ROLE_ICONS  = { docente:"👩‍🏫", masteradmin:"🛡️" };

// Tabs por rol
const TABS_DOCENTE = [
  {id:"config",    label:"⚙️ Configuración"},
  {id:"califs",    label:"✏️ Calificaciones"},
  {id:"aciertos",  label:"🎯 Aciertos"},
  {id:"pesos",     label:"⚖️ Porcentajes"},
  {id:"alumnos",   label:"👥 Alumnos"},
  {id:"reportes",  label:"📊 Reportes"},
];
const TABS_ADMIN = [
  {id:"config",    label:"⚙️ Configuración"},
  {id:"alumnos",   label:"👥 Alumnos"},
  {id:"califs",    label:"✏️ Calificaciones"},
  {id:"pesos",     label:"⚖️ Porcentajes"},
  {id:"aciertos",  label:"🎯 Aciertos"},
  {id:"reportes",  label:"📊 Reportes"},
  {id:"sync",      label:"☁️ Sincronizar"},
  {id:"usuarios",  label:"🔑 Usuarios"},
];

/* ── Helpers ─────────────────────────────────────────────────── */
function getGrade(v) {
  const n = parseFloat(v);
  if (isNaN(n)) return { label:"–", color:"#888" };
  if (n >= 9)   return { label:"MB", color:"#51cf66" };
  if (n >= 7)   return { label:"B",  color:"#4dabf7" };
  if (n >= 6)   return { label:"S",  color:"#ffd43b" };
  return              { label:"NS", color:"#ff6b6b" };
}

function calcAvg(g, w) {
  const ww = w || DEF_W;
  const total = CRITERIA.reduce((s,c)=>s+(ww[c]||0),0);
  if (!total) return null;
  let sum=0, has=false;
  for (const c of CRITERIA) {
    const v = parseFloat(g?.[c]);
    if (!isNaN(v)) { sum += v*((ww[c]||0)/total); has=true; }
  }
  return has ? Math.round(sum*100)/100 : null;
}

/* ── Local Storage (primary) ─────────────────────────────────── */
const LS = {
  get: k => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch{ return null; } },
  set: (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch{} },
};

// Restore backup from sessionStorage if present (after cache refresh)
(()=>{
  try {
    const raw = sessionStorage.getItem("__data_backup__");
    if (raw) {
      const backup = JSON.parse(raw);
      Object.entries(backup).forEach(([k,v]) => {
        if (!localStorage.getItem(k)) localStorage.setItem(k, v); // only restore if missing
      });
      sessionStorage.removeItem("__data_backup__");
    }
  } catch(e) {}
})();

/* ── Apps Script API (sync/backup) ──────────────────────────── */
async function gasLoad(url) {
  const r = await fetch(`${url}?action=load`);
  if (!r.ok) throw new Error("Error al conectar con Apps Script");
  return r.json();
}
async function gasSave(url, payload) {
  await fetch(url, {
    method:"POST",
    body: JSON.stringify({action:"save",...payload}),
  });
}

/* ── UI Atoms ────────────────────────────────────────────────── */
const Inp = ({value,onChange,placeholder,style,type="text",min,max,step,onKeyDown}) => (
  <input type={type} value={value} onChange={onChange} placeholder={placeholder}
    min={min} max={max} step={step} onKeyDown={onKeyDown}
    style={{background:"#1a1a2e",border:"1px solid #2d2d4e",borderRadius:6,color:"#e8e8f0",
      padding:"7px 10px",fontSize:13,width:"100%",...style}}/>
);

const Sel = ({value,onChange,children,style}) => (
  <select value={value} onChange={onChange}
    style={{background:"#1a1a2e",border:"1px solid #2d2d4e",borderRadius:6,color:"#e8e8f0",
      padding:"7px 10px",fontSize:13,...style}}>{children}</select>
);

const Btn = ({onClick,children,variant="primary",style,disabled}) => {
  const V = {
    primary:  {background:"#4361ee",color:"#fff",border:"none"},
    secondary:{background:"#2d2d4e",color:"#c0c0e0",border:"1px solid #3d3d60"},
    danger:   {background:"#ff6b6b22",color:"#ff6b6b",border:"1px solid #ff6b6b44"},
    success:  {background:"#51cf6622",color:"#51cf66",border:"1px solid #51cf6644"},
    warning:  {background:"#ffd43b22",color:"#ffd43b",border:"1px solid #ffd43b44"},
  };
  return (
    <button onClick={onClick} disabled={disabled}
      style={{...V[variant],borderRadius:7,padding:"7px 14px",fontSize:13,cursor:disabled?"not-allowed":"pointer",
        opacity:disabled?0.5:1,fontWeight:600,transition:"opacity .15s",whiteSpace:"nowrap",...style}}>
      {children}
    </button>
  );
};

const Card = ({children,style}) => (
  <div style={{background:"#16162a",border:"1px solid #2d2d4e",borderRadius:10,padding:16,...style}}>
    {children}
  </div>
);

const Badge = ({value}) => {
  const g = getGrade(value);
  return <span style={{background:g.color+"22",color:g.color,border:`1px solid ${g.color}44`,
    borderRadius:4,fontSize:10,padding:"1px 5px",fontWeight:700,letterSpacing:1}}>{g.label}</span>;
};

const TH = {padding:"10px 8px",textAlign:"center",fontSize:12,color:"#8080b0",fontWeight:700,borderBottom:"2px solid #2d2d4e"};
const TD = {padding:"8px 8px",textAlign:"center",fontSize:13,color:"#d0d0e8"};

/* ── TABS ────────────────────────────────────────────────────── */
const TABS = [
  {id:"config",    label:"⚙️ Configuración"},
  {id:"alumnos",   label:"👥 Alumnos"},
  {id:"califs",    label:"✏️ Calificaciones"},
  {id:"pesos",     label:"⚖️ Porcentajes"},
  {id:"reportes",  label:"📊 Reportes"},
  {id:"sync",      label:"☁️ Sincronizar"},
];

/* ══════════════════════════════════════════════════════════════ */
/*  LOGIN SCREEN                                                  */
/* ══════════════════════════════════════════════════════════════ */
function LoginScreen({ onLogin, schoolLogo, schoolName }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [showPass, setShowPass] = useState(false);
  const [error,    setError]    = useState("");
  const [loading,  setLoading]  = useState(false);
  const [shake,    setShake]    = useState(false);

  const getUsers = () => LS.get("sys_users") || DEFAULT_USERS;

  const doLogin = () => {
    if (!username.trim() || !password.trim()) { triggerError("Ingresa tu usuario y contraseña"); return; }
    setLoading(true);
    setTimeout(() => {
      const users = getUsers();
      const user  = users.find(u => u.username.toLowerCase() === username.trim().toLowerCase());
      if (!user || !user.active) { setLoading(false); triggerError("Usuario no encontrado o inactivo"); return; }
      if (user.passHash !== hashStr(password)) { setLoading(false); triggerError("Contraseña incorrecta"); return; }
      // Guardar sesión
      LS.set("session", { userId: user.id, username: user.username, name: user.name, role: user.role, loginAt: Date.now() });
      onLogin({ userId: user.id, username: user.username, name: user.name, role: user.role });
    }, 700);
  };

  const triggerError = (msg) => { setError(msg); setShake(true); setTimeout(()=>setShake(false), 500); };

  const stars = Array.from({length:12},(_,i)=>i);

  return (
    <div style={{minHeight:"100vh",background:"#0d0d1a",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden",padding:16}}>
      {/* Fondo decorativo */}
      <div style={{position:"absolute",inset:0,overflow:"hidden",pointerEvents:"none"}}>
        {/* Orbes */}
        <div style={{position:"absolute",top:"-10%",left:"-5%",width:400,height:400,borderRadius:"50%",background:"radial-gradient(circle,#4361ee18 0%,transparent 70%)"}}/>
        <div style={{position:"absolute",bottom:"-10%",right:"-5%",width:500,height:500,borderRadius:"50%",background:"radial-gradient(circle,#cc5de818 0%,transparent 70%)"}}/>
        <div style={{position:"absolute",top:"40%",right:"10%",width:300,height:300,borderRadius:"50%",background:"radial-gradient(circle,#4dabf710 0%,transparent 70%)"}}/>
        {/* Grid */}
        <div style={{position:"absolute",inset:0,backgroundImage:"linear-gradient(#ffffff06 1px,transparent 1px),linear-gradient(90deg,#ffffff06 1px,transparent 1px)",backgroundSize:"40px 40px"}}/>
        {/* Floating stars */}
        {stars.map(i=>(
          <div key={i} style={{
            position:"absolute",
            left:`${8+i*7}%`, top:`${15+((i*37)%70)}%`,
            width: i%3===0?3:2, height: i%3===0?3:2,
            borderRadius:"50%", background:"#ffffff",
            opacity: 0,
            animation:`starFloat ${3+i*0.4}s ease-in-out ${i*0.3}s infinite`,
          }}/>
        ))}
      </div>

      {/* Card */}
      <div className="login-wrap" style={{
        width:"100%", maxWidth:420, position:"relative", zIndex:1,
      }}>
        {/* Logo / Foto de escuela */}
        <div style={{textAlign:"center",marginBottom:28}}>
          {schoolLogo ? (
            <div style={{display:"inline-block",marginBottom:14}}>
              <img src={schoolLogo} alt="Logo escuela"
                style={{width:96,height:96,borderRadius:20,objectFit:"cover",
                  border:"2px solid #4361ee44",
                  boxShadow:"0 0 32px #4361ee30"}}/>
            </div>
          ) : (
            <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",
              width:80,height:80,borderRadius:20,
              background:"linear-gradient(135deg,#1a1a3e,#2d2d60)",
              border:"2px solid #4361ee44",
              boxShadow:"0 0 32px #4361ee30",
              fontSize:38,marginBottom:14}}>🏫</div>
          )}
          <div style={{fontSize:22,fontWeight:800,color:"#e8e8f0",letterSpacing:.5}}>
            {schoolName || "Sistema de Calificaciones"}
          </div>
          <div style={{fontSize:13,color:"#6060a0",marginTop:4}}>Accede con tu cuenta institucional</div>
        </div>

        {/* Form card */}
        <div className={shake?"shake-anim":""} style={{
          background:"#12122a",
          border:"1px solid #2d2d4e",
          borderRadius:16,
          padding:32,
          boxShadow:"0 20px 60px #00000060",
        }}>
          {/* Usuario */}
          <div style={{marginBottom:16}}>
            <label style={{fontSize:12,color:"#8080b0",fontWeight:600,display:"block",marginBottom:6,letterSpacing:.5}}>USUARIO</label>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:16}}>👤</span>
              <input
                type="text" value={username}
                onChange={e=>{setUsername(e.target.value);setError("");}}
                onKeyDown={e=>e.key==="Enter"&&doLogin()}
                placeholder="Nombre de usuario"
                style={{width:"100%",background:"#1a1a2e",border:`1px solid ${error?"#ff6b6b66":"#2d2d4e"}`,
                  borderRadius:8,color:"#e8e8f0",padding:"10px 12px 10px 38px",fontSize:14,transition:"border-color .2s"}}
              />
            </div>
          </div>

          {/* Contraseña */}
          <div style={{marginBottom:20}}>
            <label style={{fontSize:12,color:"#8080b0",fontWeight:600,display:"block",marginBottom:6,letterSpacing:.5}}>CONTRASEÑA</label>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:16}}>🔒</span>
              <input
                type={showPass?"text":"password"} value={password}
                onChange={e=>{setPassword(e.target.value);setError("");}}
                onKeyDown={e=>e.key==="Enter"&&doLogin()}
                placeholder="••••••••"
                style={{width:"100%",background:"#1a1a2e",border:`1px solid ${error?"#ff6b6b66":"#2d2d4e"}`,
                  borderRadius:8,color:"#e8e8f0",padding:"10px 38px 10px 38px",fontSize:14,transition:"border-color .2s"}}
              />
              <button onClick={()=>setShowPass(p=>!p)}
                style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",
                  background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#7070a0",padding:4}}>
                {showPass?"🙈":"👁️"}
              </button>
            </div>
          </div>

          {/* Error */}
          {error && (
            <div style={{background:"#ff6b6b15",border:"1px solid #ff6b6b44",borderRadius:8,
              padding:"8px 12px",marginBottom:16,fontSize:13,color:"#ff6b6b",display:"flex",gap:8,alignItems:"center"}}>
              ⚠️ {error}
            </div>
          )}

          {/* Botón */}
          <button onClick={doLogin} disabled={loading}
            style={{width:"100%",background:"linear-gradient(135deg,#4361ee,#7048c8)",
              color:"#fff",border:"none",borderRadius:8,padding:"12px",fontSize:15,fontWeight:700,
              cursor:loading?"not-allowed":"pointer",opacity:loading?0.7:1,
              boxShadow:"0 4px 20px #4361ee44",transition:"opacity .2s",letterSpacing:.3}}>
            {loading ? (
              <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                <span style={{display:"inline-block",width:16,height:16,border:"2px solid #ffffff60",
                  borderTop:"2px solid #fff",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>
                Verificando...
              </span>
            ) : "Iniciar Sesión →"}
          </button>
        </div>

        {/* Perfiles hint */}
        <div style={{marginTop:20,display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          {[{role:"docente",icon:"👩‍🏫",label:"Docente"},{role:"masteradmin",icon:"🛡️",label:"Master Admin"}].map(p=>(
            <div key={p.role} style={{
              background:"#12122a",border:`1px solid ${ROLE_COLORS[p.role]}33`,borderRadius:8,
              padding:"6px 14px",fontSize:12,color:ROLE_COLORS[p.role],display:"flex",alignItems:"center",gap:6
            }}>{p.icon} {p.label}</div>
          ))}
        </div>

        <div style={{textAlign:"center",marginTop:16,fontSize:11,color:"#3d3d60"}}>
          Sistema de Calificaciones Escolar · Acceso restringido
        </div>

        {/* Cache refresh button */}
        <div style={{textAlign:"center",marginTop:12}}>
          <button onClick={async()=>{
            try {
              // 1. Backup ALL data to sessionStorage before clearing anything
              const keys = ["cfg","stu","wts","grd","tot","sys_users"];
              const backup = {};
              keys.forEach(k=>{ const v=localStorage.getItem(k); if(v) backup[k]=v; });
              sessionStorage.setItem("__data_backup__", JSON.stringify(backup));

              // 2. Clear SW caches (NOT localStorage)
              if("caches" in window){
                const cacheKeys = await caches.keys();
                await Promise.all(cacheKeys.map(k=>caches.delete(k)));
              }
              // 3. Unregister service workers
              if("serviceWorker" in navigator){
                const regs = await navigator.serviceWorker.getRegistrations();
                await Promise.all(regs.map(r=>r.unregister()));
              }
              // 4. Hard reload — data stays in localStorage + sessionStorage backup
              window.location.reload(true);
            } catch(e){ window.location.reload(true); }
          }} style={{
            background:"none",border:"1px solid #2d2d4e",borderRadius:6,
            color:"#5050a0",fontSize:11,padding:"5px 14px",cursor:"pointer",
            display:"inline-flex",alignItems:"center",gap:6,transition:"all .2s"
          }}
          onMouseOver={e=>{e.currentTarget.style.borderColor="#4361ee66";e.currentTarget.style.color="#8080c0";}}
          onMouseOut={e=>{e.currentTarget.style.borderColor="#2d2d4e";e.currentTarget.style.color="#5050a0";}}>
            🔄 Actualizar caché
          </button>
          <div style={{fontSize:10,color:"#3d3d60",marginTop:5}}>Los datos guardados no se borran</div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════ */
/*  ROOT APP                                                      */
/* ══════════════════════════════════════════════════════════════ */
function App() {
  const [session, setSession] = useState(() => {
    const s = LS.get("session");
    if (!s) return null;
    // Sesión expira en 12 horas
    if (Date.now() - s.loginAt > 12*60*60*1000) { LS.set("session",null); return null; }
    return s;
  });

  const [tab,    setTab]    = useState(null);
  const [toast,  setToast]  = useState(null);
  const [syncing,setSyncing]= useState(false);

  const [config,     setConfig]     = useState(() => LS.get("cfg") || {year:new Date().getFullYear().toString(),grade:"1°",group:"A",numBimestres:5,schoolName:"Mi Escuela",gasUrl:""});
  const [students,   setStudents]   = useState(() => LS.get("stu") || []);
  const [weights,    setWeights]    = useState(() => LS.get("wts") || {});
  const [grades,     setGrades]     = useState(() => LS.get("grd") || {});
  const [totals,     setTotals]     = useState(() => LS.get("tot") || {});
  const [rawGrades,  setRawGrades]  = useState(() => LS.get("raw") || {});
  const [schoolLogo, setSchoolLogo] = useState(() => localStorage.getItem("logo") || null);

  const isAdmin   = session?.role === "masteradmin";
  const TABS      = isAdmin ? TABS_ADMIN : TABS_DOCENTE;

  // Set default tab on login
  useEffect(() => {
    if (session && !tab) setTab(isAdmin ? "config" : "califs");
  }, [session]);

  const showToast = (msg, type="ok") => {
    setToast({msg,type});
    setTimeout(()=>setToast(null),2400);
  };

  const saveConfig    = c => { setConfig(c);     LS.set("cfg",c); };
  const saveStudents  = s => { setStudents(s);   LS.set("stu",s); };
  const saveWeights   = w => { setWeights(w);    LS.set("wts",w); };
  const saveGrades    = g => { setGrades(g);     LS.set("grd",g); };
  const saveTotals    = t => { setTotals(t);     LS.set("tot",t); };
  const saveRawGrades = r => { setRawGrades(r);  LS.set("raw",r); };
  const saveLogo      = b64 => { setSchoolLogo(b64); try{ if(b64) localStorage.setItem("logo",b64); else localStorage.removeItem("logo"); }catch{} };

  const logout = () => {
    LS.set("session", null);
    setSession(null);
    setTab(null);
    showToast("Sesión cerrada ✓");
  };

  const syncPush = async () => {
    if (!config.gasUrl) { showToast("Configura la URL de Apps Script primero","err"); return; }
    setSyncing(true);
    try {
      await gasSave(config.gasUrl, {config, students, weights, grades});
      showToast("☁️ Datos enviados a Google Sheets ✓");
    } catch(e) { showToast("Error al sincronizar: "+e.message,"err"); }
    setSyncing(false);
  };

  const syncPull = async () => {
    if (!config.gasUrl) { showToast("Configura la URL de Apps Script primero","err"); return; }
    setSyncing(true);
    try {
      const d = await gasLoad(config.gasUrl);
      if (d.config)   { setConfig(d.config);     LS.set("cfg",d.config); }
      if (d.students) { setStudents(d.students);  LS.set("stu",d.students); }
      if (d.weights)  { setWeights(d.weights);    LS.set("wts",d.weights); }
      if (d.grades)   { setGrades(d.grades);      LS.set("grd",d.grades); }
      showToast("☁️ Datos descargados desde Google Sheets ✓");
    } catch(e) { showToast("Error al sincronizar: "+e.message,"err"); }
    setSyncing(false);
  };

  if (!session) return <LoginScreen onLogin={s => { setSession(s); }} schoolLogo={schoolLogo} schoolName={config.schoolName} />;

  const roleColor = ROLE_COLORS[session.role] || "#4361ee";
  const roleIcon  = ROLE_ICONS[session.role]  || "👤";

  return (
    <div style={{minHeight:"100vh"}}>
      {/* Header */}
      <div className="app-header" style={{background:"linear-gradient(135deg,#1a1a3e 0%,#0f0f2d 100%)",borderBottom:"1px solid #2d2d4e",padding:"10px 20px",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
        <span style={{fontSize:26}}>🏫</span>
        <div>
          <div style={{fontSize:16,fontWeight:700}}>{config.schoolName||"Sistema de Calificaciones"}</div>
          <div style={{fontSize:11,color:"#7070a0"}}>{config.year} · {config.grade} · Grupo {config.group}</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          {isAdmin && config.gasUrl && (
            <>
              <Btn onClick={syncPull} variant="secondary" disabled={syncing} style={{fontSize:12,padding:"5px 10px"}}>{syncing?"⏳":"⬇️"} Importar</Btn>
              <Btn onClick={syncPush} variant="warning"   disabled={syncing} style={{fontSize:12,padding:"5px 10px"}}>{syncing?"⏳":"⬆️"} Exportar</Btn>
            </>
          )}
          {/* User badge */}
          <div style={{display:"flex",alignItems:"center",gap:8,background:"#1a1a2e",border:`1px solid ${roleColor}33`,borderRadius:20,padding:"5px 12px"}}>
            <span style={{fontSize:14}}>{roleIcon}</span>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:"#e8e8f0",lineHeight:1.2}}>{session.name}</div>
              <div style={{fontSize:10,color:roleColor,fontWeight:600}}>{ROLE_LABELS[session.role]}</div>
            </div>
          </div>
          <button onClick={logout} title="Cerrar sesión"
            style={{background:"#ff6b6b15",border:"1px solid #ff6b6b33",borderRadius:8,color:"#ff6b6b",
              padding:"6px 10px",fontSize:12,cursor:"pointer",fontWeight:600}}>
            🚪
          </button>
        </div>
      </div>

      {/* Tabs */}
      <div className="tab-bar" style={{display:"flex",background:"#12122a",borderBottom:"1px solid #2d2d4e",overflowX:"auto"}}>
        {TABS.map(t=>{
          // Split emoji and text for mobile column layout
          const match = t.label.match(/^(\S+)\s(.+)$/);
          const emoji = match?.[1] || t.label;
          const text  = match?.[2] || "";
          return (
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              padding:"12px 16px",fontSize:13,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",
              background:"none",border:"none",display:"flex",alignItems:"center",gap:4,
              borderBottom:tab===t.id?"2px solid #4361ee":"2px solid transparent",
              color:tab===t.id?"#4361ee":"#7070a0",transition:"all .15s"
            }}>
              <span className="tab-emoji">{emoji}</span>
              <span className="tab-text">{text}</span>
            </button>
          );
        })}
      </div>

      {/* Content */}
      <div className="main-content" style={{padding:20,maxWidth:1100,margin:"0 auto"}}>
        {tab==="config"    && <TabConfig   config={config} onSave={saveConfig} schoolLogo={schoolLogo} onSaveLogo={saveLogo} showToast={showToast}/>}
        {tab==="alumnos"   && <TabAlumnos  students={students} onSave={saveStudents} showToast={showToast}/>}
        {tab==="califs"    && <TabCalifs   config={config} students={students} grades={grades} weights={weights} totals={totals} rawGrades={rawGrades} onSave={saveGrades} onSaveRaw={saveRawGrades} showToast={showToast}/>}
        {tab==="pesos"     && <TabPesos    config={config} weights={weights} totals={totals} onSave={saveWeights} onSaveTotals={saveTotals} showToast={showToast}/>}
        {tab==="aciertos"  && <TabAciertos config={config} totals={totals} weights={weights} onSaveTotals={saveTotals} showToast={showToast}/>}
        {tab==="reportes"  && <TabReportes config={config} students={students} grades={grades} weights={weights}/>}
        {tab==="sync"      && <TabSync     config={config} onSaveConfig={saveConfig} onPush={syncPush} onPull={syncPull} syncing={syncing} showToast={showToast} students={students} grades={grades} weights={weights}/>}
        {tab==="usuarios"  && isAdmin && <TabUsuarios showToast={showToast}/>}
      </div>

      {/* Toast */}
      {toast && (
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",
          background:toast.type==="ok"?"#51cf66":"#ff6b6b",color:"#fff",padding:"10px 22px",
          borderRadius:8,fontWeight:600,fontSize:14,boxShadow:"0 4px 20px #0008",zIndex:999,
          animation:"fadeIn .2s"}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

/*  TAB: CONFIGURACIÓN                                            */
/* ══════════════════════════════════════════════════════════════ */
function TabConfig({config, onSave, schoolLogo, onSaveLogo, showToast}) {
  const [f,setF] = useState(config);
  const set = k => e => setF(p=>({...p,[k]:e.target.value}));
  const save = () => { onSave(f); showToast("Configuración guardada ✓"); };

  const handleLogoUpload = e => {
    const file = e.target.files[0];
    if (!file) return;
    if (!file.type.startsWith("image/")) { showToast("Solo se permiten imágenes","err"); return; }
    if (file.size > 2*1024*1024) { showToast("La imagen debe ser menor a 2MB","err"); return; }
    const reader = new FileReader();
    reader.onload = ev => { onSaveLogo(ev.target.result); showToast("Foto de escuela guardada ✓"); };
    reader.readAsDataURL(file);
  };

  return (
    <div>
      <h2 style={{marginBottom:6,fontSize:18}}>⚙️ Configuración del Ciclo Escolar</h2>
      <p style={{color:"#7070a0",fontSize:13,marginBottom:20}}>Cada año puedes actualizar estos datos sin borrar a los alumnos.</p>

      {/* Foto de la escuela */}
      <Card style={{marginBottom:20,background:"#12122a"}}>
        <div style={{fontSize:14,fontWeight:700,color:"#c0c0e0",marginBottom:14}}>🖼️ Foto / Logo de la Escuela</div>
        <div style={{display:"flex",alignItems:"center",gap:20,flexWrap:"wrap"}}>
          {/* Preview */}
          <div style={{flexShrink:0}}>
            {schoolLogo ? (
              <img src={schoolLogo} alt="Logo"
                style={{width:100,height:100,borderRadius:16,objectFit:"cover",
                  border:"2px solid #4361ee44",boxShadow:"0 0 20px #4361ee20"}}/>
            ) : (
              <div style={{width:100,height:100,borderRadius:16,
                background:"linear-gradient(135deg,#1a1a3e,#2d2d60)",
                border:"2px dashed #2d2d4e",
                display:"flex",flexDirection:"column",alignItems:"center",
                justifyContent:"center",gap:4}}>
                <span style={{fontSize:32}}>🏫</span>
                <span style={{fontSize:9,color:"#5050a0"}}>Sin foto</span>
              </div>
            )}
          </div>
          {/* Upload controls */}
          <div style={{flex:1,minWidth:200}}>
            <p style={{fontSize:13,color:"#8080b0",marginBottom:12,lineHeight:1.5}}>
              Esta imagen aparecerá en la <strong style={{color:"#c0c0e0"}}>pantalla de inicio de sesión</strong> como portada de tu sistema.
              Formatos: JPG, PNG, WEBP. Máximo 2MB.
            </p>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <label style={{
                background:"linear-gradient(135deg,#4361ee,#3a0ca3)",
                color:"#fff",padding:"9px 18px",borderRadius:8,
                cursor:"pointer",fontSize:13,fontWeight:700,
                border:"none",display:"inline-block",
                boxShadow:"0 4px 15px #4361ee40"}}>
                📁 Seleccionar foto
                <input type="file" accept="image/*" onChange={handleLogoUpload}
                  style={{display:"none"}}/>
              </label>
              {schoolLogo && (
                <button onClick={()=>{onSaveLogo(null);showToast("Foto eliminada");}}
                  style={{background:"#1a1a2e",border:"1px solid #ff6b6b44",borderRadius:8,
                    color:"#ff6b6b",cursor:"pointer",padding:"9px 16px",fontSize:13,fontWeight:600}}>
                  🗑 Quitar foto
                </button>
              )}
            </div>
          </div>
        </div>
      </Card>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:16,marginBottom:20}}>
        {[{k:"schoolName",label:"🏫 Nombre de la Escuela",ph:"Mi Escuela"},
          {k:"year",      label:"📅 Año Escolar",         ph:"2026"},
          {k:"grade",     label:"🎓 Grado",               ph:"1°, 2°, 3°..."},
          {k:"group",     label:"👥 Grupo",               ph:"A, B, C..."},
        ].map(({k,label,ph})=>(
          <Card key={k}>
            <div style={{fontSize:12,color:"#7070a0",marginBottom:6}}>{label}</div>
            <Inp value={f[k]||""} onChange={set(k)} placeholder={ph}/>
          </Card>
        ))}
        <Card>
          <div style={{fontSize:12,color:"#7070a0",marginBottom:6}}>🗓️ Número de Bimestres</div>
          <Sel value={f.numBimestres} onChange={e=>setF(p=>({...p,numBimestres:parseInt(e.target.value)}))}>
            {[1,2,3,4,5,6].map(n=><option key={n} value={n}>{n} Bimestre{n>1?"s":""}</option>)}
          </Sel>
        </Card>
      </div>

      <Btn onClick={save} style={{minWidth:160}}>💾 Guardar Configuración</Btn>

      <Card style={{marginTop:24,background:"#12122a"}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:10,color:"#c0c0e0"}}>📌 Materias del sistema</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
          {SUBJECTS.map(s=>(
            <div key={s} style={{background:SUB_COLOR[s].bg,border:`1px solid ${SUB_COLOR[s].accent}44`,
              borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:600,color:SUB_COLOR[s].accent}}>
              {s}
            </div>
          ))}
        </div>
        <p style={{fontSize:12,color:"#7070a0",marginTop:8}}>Cada materia se evalúa de forma independiente por bimestre.</p>
      </Card>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════ */
/*  TAB: ALUMNOS                                                  */
/* ══════════════════════════════════════════════════════════════ */
function TabAlumnos({students, onSave, showToast}) {
  const [newName,  setNewName]  = useState("");
  const [editId,   setEditId]   = useState(null);
  const [editName, setEditName] = useState("");
  const [search,   setSearch]   = useState("");
  const [confirmDel, setConfirmDel] = useState(null);

  const filtered = students.filter(s=>s.name.toLowerCase().includes(search.toLowerCase()));

  const add = () => {
    const name = newName.trim(); if (!name) return;
    if (students.find(s=>s.name.toLowerCase()===name.toLowerCase()))
      { showToast("Ya existe ese alumno","err"); return; }
    onSave([...students,{id:uid(),name}]);
    setNewName(""); showToast(`"${name}" agregado ✓`);
  };

  const del = id => {
    const s = students.find(x=>x.id===id);
    onSave(students.filter(x=>x.id!==id));
    showToast(`"${s?.name}" eliminado`); setConfirmDel(null);
  };

  const saveEdit = () => {
    const name = editName.trim(); if (!name) return;
    onSave(students.map(s=>s.id===editId?{...s,name}:s));
    setEditId(null); showToast("Nombre actualizado ✓");
  };

  return (
    <div>
      <h2 style={{marginBottom:6,fontSize:18}}>👥 Gestión de Alumnos</h2>
      <p style={{color:"#7070a0",fontSize:13,marginBottom:20}}>Los alumnos persisten entre ciclos escolares.</p>

      <Card style={{marginBottom:20}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:10,color:"#c0c0e0"}}>➕ Agregar Alumno</div>
        <div style={{display:"flex",gap:10}}>
          <Inp value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Nombre completo..."
            onKeyDown={e=>e.key==="Enter"&&add()} style={{flex:1}}/>
          <Btn onClick={add} disabled={!newName.trim()}>Agregar</Btn>
        </div>
      </Card>

      <div style={{display:"flex",gap:10,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
        <Inp value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar alumno..." style={{maxWidth:280}}/>
        <span style={{color:"#7070a0",fontSize:13,marginLeft:"auto"}}>{filtered.length} / {students.length} alumnos</span>
      </div>

      {filtered.length===0 ? (
        <Card style={{textAlign:"center",padding:40,color:"#7070a0"}}>
          {students.length===0?"No hay alumnos. ¡Agrega el primero!":"Sin resultados."}
        </Card>
      ) : (
        <div style={{display:"grid",gap:8}}>
          {filtered.map((s,i)=>(
            <Card key={s.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px"}}>
              <div style={{width:32,height:32,borderRadius:"50%",background:"#1a1a3e",border:"1px solid #3d3d70",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#7070c0",flexShrink:0}}>
                {i+1}
              </div>
              {editId===s.id ? (
                <>
                  <Inp value={editName} onChange={e=>setEditName(e.target.value)} style={{flex:1}}
                    onKeyDown={e=>e.key==="Enter"&&saveEdit()}/>
                  <Btn onClick={saveEdit} variant="success" style={{padding:"5px 12px"}}>✓</Btn>
                  <Btn onClick={()=>setEditId(null)} variant="secondary" style={{padding:"5px 12px"}}>✕</Btn>
                </>
              ) : (
                <>
                  <span style={{flex:1,fontWeight:500}}>{s.name}</span>
                  <Btn onClick={()=>{setEditId(s.id);setEditName(s.name);}} variant="secondary" style={{padding:"5px 10px"}}>✏️</Btn>
                  <Btn onClick={()=>setConfirmDel(s.id)} variant="danger" style={{padding:"5px 10px"}}>🗑️</Btn>
                </>
              )}
            </Card>
          ))}
        </div>
      )}

      {/* Delete confirm modal */}
      {confirmDel && (()=>{
        const s = students.find(x=>x.id===confirmDel);
        return (
          <div style={{position:"fixed",inset:0,background:"#000a",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
            <Card style={{maxWidth:340,textAlign:"center"}}>
              <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
              <div style={{fontWeight:700,marginBottom:8}}>¿Eliminar alumno?</div>
              <div style={{color:"#a0a0c0",fontSize:14,marginBottom:20}}>
                Se eliminará a <strong>{s?.name}</strong> y todas sus calificaciones.
              </div>
              <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                <Btn onClick={()=>del(confirmDel)} variant="danger">Sí, eliminar</Btn>
                <Btn onClick={()=>setConfirmDel(null)} variant="secondary">Cancelar</Btn>
              </div>
            </Card>
          </div>
        );
      })()}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════ */
/*  TAB: CALIFICACIONES                                           */
/* ══════════════════════════════════════════════════════════════ */
function TabCalifs({config, students, grades, weights, totals, rawGrades, onSave, onSaveRaw, showToast}) {
  const [subject,      setSubject]      = useState(SUBJECTS[0]);
  const [bimestre,     setBimestre]     = useState(1);
  const [local,        setLocal]        = useState({});
  const [dirty,        setDirty]        = useState(false);
  const [editingRows,  setEditingRows]  = useState(new Set());
  const [confirmClear, setConfirmClear] = useState(null);

  const col  = SUB_COLOR[subject];
  const wKey = `${subject}-${bimestre}`;
  const w    = weights[wKey] || DEF_W;
  const bims = Array.from({length:config.numBimestres},(_,i)=>i+1);

  const getMax = crit => {
    if (CRIT_TYPE[crit] === "pct_directo") return null;
    const t = totals[`${subject}-${bimestre}-${crit}`];
    return (t && t > 0) ? t : null;
  };
  const anyMaxConfigured = CRITERIA.some(c => CRIT_TYPE[c] !== "pct_directo" && getMax(c));

  // Convierte valor crudo → calificación 0-10
  const toGrade = (val, crit) => {
    const n = parseFloat(val);
    if (isNaN(n) || val === "") return null;
    const type = CRIT_TYPE[crit];
    if (type === "pct_directo") {
      const maxPct = w[crit] || 0;
      if (!maxPct) return null;
      return Math.min(10, Math.round((n / maxPct) * 10 * 100) / 100);
    }
    const max = getMax(crit);
    if (max) return Math.min(10, Math.round((n / max) * 10 * 100) / 100);
    return Math.min(10, Math.max(0, n));
  };

  // Contribución al promedio global en puntos %
  const toContrib = (val, crit) => {
    const n = parseFloat(val);
    if (isNaN(n) || val === "") return null;
    const type = CRIT_TYPE[crit];
    if (type === "pct_directo") return Math.min(w[crit]||0, Math.round(n * 100) / 100);
    const max = getMax(crit);
    if (max) return Math.round((n / max) * (w[crit]||0) * 100) / 100;
    return null;
  };

  const getConvertedRow = sid => {
    const row = local[sid] || {};
    const out = {};
    CRITERIA.forEach(c => { const g = toGrade(row[c], c); if (g !== null) out[c] = g; });
    return out;
  };

  // Carga valores guardados al estado local
  const loadLocal = (stus, grd, raw, tot, sub, bim) => {
    const init = {};
    stus.forEach(s => {
      const key      = `${s.id}-${sub}-${bim}`;
      const rawEntry = raw[key] || {};
      const grdEntry = grd[key] || {};
      const entry    = {};
      CRITERIA.forEach(c => {
        const type = CRIT_TYPE[c];
        if (type === "pct_directo") {
          entry[c] = rawEntry[c] !== undefined ? rawEntry[c] : "";
        } else {
          const max = tot[`${sub}-${bim}-${c}`];
          entry[c]  = (max && rawEntry[c] !== undefined) ? rawEntry[c] : (grdEntry[c] ?? "");
        }
      });
      init[s.id] = entry;
    });
    return init;
  };

  useEffect(() => {
    setLocal(loadLocal(students, grades, rawGrades, totals, subject, bimestre));
    setDirty(false);
    setEditingRows(new Set()); // reset editing state on subject/bimestre change
  }, [subject, bimestre, students, grades, rawGrades, totals]);

  const setVal = (sid, crit, val) => {
    setLocal(p => ({...p, [sid]: {...p[sid], [crit]: val}}));
    setDirty(true);
  };

  // Snapshot of saved values for a student (to cancel edits)
  const getSavedSnapshot = sid => {
    const key      = `${sid}-${subject}-${bimestre}`;
    const rawEntry = rawGrades[key] || {};
    const grdEntry = grades[key]    || {};
    const entry    = {};
    CRITERIA.forEach(c => {
      const type = CRIT_TYPE[c];
      if (type === "pct_directo") {
        entry[c] = rawEntry[c] !== undefined ? rawEntry[c] : "";
      } else {
        const max = totals[`${subject}-${bimestre}-${c}`];
        entry[c] = (max && rawEntry[c] !== undefined) ? rawEntry[c] : (grdEntry[c] ?? "");
      }
    });
    return entry;
  };

  const startEdit = sid => setEditingRows(p => new Set([...p, sid]));

  const cancelEdit = sid => {
    setLocal(p => ({...p, [sid]: getSavedSnapshot(sid)}));
    setEditingRows(p => { const n = new Set(p); n.delete(sid); return n; });
  };

  // Save a single student's row
  const saveRow = sid => {
    const nextGrades = {...grades};
    const nextRaw    = {...rawGrades};
    const key        = `${sid}-${subject}-${bimestre}`;
    nextGrades[key]  = getConvertedRow(sid);
    const rawEntry   = {};
    CRITERIA.forEach(c => { if ((local[sid]?.[c] ?? "") !== "") rawEntry[c] = local[sid][c]; });
    nextRaw[key]     = rawEntry;
    onSave(nextGrades);
    onSaveRaw(nextRaw);
    setEditingRows(p => { const n = new Set(p); n.delete(sid); return n; });
    // check if any other rows still dirty
    const remaining = students.filter(s => s.id !== sid && editingRows.has(s.id));
    if (remaining.length === 0) setDirty(false);
    showToast(`Guardado: ${students.find(x=>x.id===sid)?.name} ✓`);
  };

  // Save ALL rows at once
  const saveAll = () => {
    const nextGrades = {...grades};
    const nextRaw    = {...rawGrades};
    students.forEach(s => {
      const key       = `${s.id}-${subject}-${bimestre}`;
      nextGrades[key] = getConvertedRow(s.id);
      const rawEntry  = {};
      CRITERIA.forEach(c => { if ((local[s.id]?.[c] ?? "") !== "") rawEntry[c] = local[s.id][c]; });
      nextRaw[key]    = rawEntry;
    });
    onSave(nextGrades);
    onSaveRaw(nextRaw);
    setDirty(false);
    setEditingRows(new Set());
    showToast(`${subject} · Bimestre ${bimestre} guardado ✓`);
  };

  const clearStudent = sid => {
    setLocal(p => ({...p, [sid]: {tareas:"",trabajos:"",disciplina:"",examen:""}}));
    setEditingRows(p => new Set([...p, sid])); // auto enter edit mode so can save
    setDirty(true);
    setConfirmClear(null);
    showToast("Calificaciones limpiadas — guarda para confirmar");
  };

  const hasSaved = sid => {
    const g = grades[`${sid}-${subject}-${bimestre}`] || {};
    return CRITERIA.some(c => g[c] !== undefined && g[c] !== "");
  };

  // New students (no saved data) start in edit mode automatically
  useEffect(() => {
    const newEditing = new Set();
    students.forEach(s => { if (!hasSaved(s.id)) newEditing.add(s.id); });
    setEditingRows(newEditing);
  }, [subject, bimestre, students, grades]);

  return (
    <div>
      <h2 style={{marginBottom:6,fontSize:18}}>✏️ Calificaciones</h2>
      <p style={{color:"#7070a0",fontSize:13,marginBottom:16}}>Las calificaciones guardadas se muestran en modo lectura. Presiona ✏️ para corregir.</p>

      {/* Unsaved changes banner */}
      {dirty && (
        <div style={{background:"#ffd43b18",border:"1px solid #ffd43b55",borderRadius:8,
          padding:"8px 14px",marginBottom:14,fontSize:13,color:"#ffd43b",
          display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexWrap:"wrap"}}>
          <span>⚠️ Tienes filas con cambios sin guardar en <strong>{subject} · Bimestre {bimestre}</strong></span>
          <Btn onClick={saveAll} style={{padding:"5px 14px",fontSize:12}}>💾 Guardar todo</Btn>
        </div>
      )}

      {/* Selectors */}
      <div style={{display:"flex",flexWrap:"wrap",gap:14,marginBottom:16}}>
        <div>
          <div style={{fontSize:12,color:"#7070a0",marginBottom:5}}>Materia</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {SUBJECTS.map(sub => {
              const c = SUB_COLOR[sub];
              return (
                <button key={sub} onClick={()=>{ if(dirty&&!confirm("¿Cambiar sin guardar?")) return; setSubject(sub); }} style={{
                  padding:"8px 14px",borderRadius:8,cursor:"pointer",fontWeight:600,fontSize:13,
                  background:subject===sub?c.bg:"#1a1a2e",
                  border:subject===sub?`1px solid ${c.accent}`:"1px solid #2d2d4e",
                  color:subject===sub?c.accent:"#7070a0",transition:"all .15s"
                }}>{sub}</button>
              );
            })}
          </div>
        </div>
        <div>
          <div style={{fontSize:12,color:"#7070a0",marginBottom:5}}>Bimestre</div>
          <div style={{display:"flex",gap:6}}>
            {bims.map(n => (
              <button key={n} onClick={()=>{ if(dirty&&!confirm("¿Cambiar sin guardar?")) return; setBimestre(n); }} style={{
                width:38,height:36,borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:14,
                background:bimestre===n?"#4361ee":"#1a1a2e",
                border:bimestre===n?"1px solid #4361ee":"1px solid #2d2d4e",
                color:bimestre===n?"#fff":"#7070a0",
              }}>{n}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Info bar: peso + tipo + máximo de cada criterio */}
      <Card style={{marginBottom:14,background:col.bg,borderColor:col.accent+"44",padding:"10px 14px"}}>
        <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
          {CRITERIA.map(c => {
            const type  = CRIT_TYPE[c];
            const max   = getMax(c);
            const typeC = type === "cantidad" ? "#4dabf7" : type === "pct_directo" ? "#cc5de8" : "#51cf66";
            return (
              <div key={c} style={{background:"#00000030",borderRadius:8,padding:"8px 12px",flex:"1 1 120px"}}>
                <div style={{fontSize:11,color:col.light,marginBottom:3}}>{C_ICONS[c]} {C_LABELS[c]}</div>
                <div style={{fontSize:15,fontWeight:800,color:col.accent,marginBottom:3}}>{w[c]}%</div>
                <div style={{fontSize:10,padding:"2px 6px",borderRadius:4,display:"inline-block",
                  background:typeC+"22",color:typeC,border:`1px solid ${typeC}44`}}>
                  {type === "cantidad"    && (max ? `${max} tareas/trabajos` : "⚠ configura cantidad")}
                  {type === "reactivos"   && (max ? `${max} reactivos`       : "⚠ configura reactivos")}
                  {type === "pct_directo" && `% directo (0–${w[c]}%)`}
                </div>
              </div>
            );
          })}
        </div>
      </Card>

      {students.length === 0 ? (
        <Card style={{textAlign:"center",padding:40,color:"#7070a0"}}>
          Ve a la pestaña 👥 Alumnos para agregar alumnos.
        </Card>
      ) : (
        <>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",minWidth:560}}>
              <thead>
                <tr style={{background:"#12122a"}}>
                  <th style={TH}>#</th>
                  <th style={{...TH,textAlign:"left",minWidth:130}}>Alumno</th>
                  {CRITERIA.map(c => {
                    const max  = getMax(c);
                    const type = CRIT_TYPE[c];
                    return (
                      <th key={c} style={TH}>
                        {C_ICONS[c]} {C_LABELS[c]}<br/>
                        <span style={{fontWeight:400,fontSize:10,color:
                          type==="pct_directo"?"#cc5de8":max?"#51cf66":"#ffd43b"}}>
                          {w[c]}%
                          {type==="cantidad"    && (max ? ` · ${max}pzs` : " · ⚠sin config")}
                          {type==="reactivos"   && (max ? ` · ${max}rcts`: " · ⚠sin config")}
                          {type==="pct_directo" && ` · %directo`}
                        </span>
                      </th>
                    );
                  })}
                  <th style={{...TH,color:col.accent}}>Promedio</th>
                  <th style={{...TH,fontSize:11,color:"#5050a0"}}>Acciones</th>
                </tr>
              </thead>
              <tbody>
                {students.map((s, i) => {
                  const row       = local[s.id] || {};
                  const converted = getConvertedRow(s.id);
                  const avg       = calcAvg(converted, w);
                  const saved     = hasSaved(s.id);
                  const isEditing = editingRows.has(s.id);

                  return (
                    <tr key={s.id} style={{
                      borderBottom:"1px solid #1d1d38",
                      background: isEditing ? col.bg+"88" : "transparent",
                      transition:"background .2s"
                    }}>
                      {/* # */}
                      <td style={{...TD,color:"#5050a0",width:28,fontSize:12}}>{i+1}</td>

                      {/* Alumno */}
                      <td style={{...TD,textAlign:"left",fontWeight:500}}>
                        <div style={{display:"flex",alignItems:"center",gap:5}}>
                          <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:110}}>{s.name}</span>
                          {saved && !isEditing && <span style={{fontSize:9,color:"#51cf6680"}}>✓</span>}
                          {isEditing && saved    && <span style={{fontSize:9,color:col.accent,fontWeight:700}}>EDITANDO</span>}
                          {isEditing && !saved   && <span style={{fontSize:9,color:"#ffd43b"}}>NUEVO</span>}
                        </div>
                      </td>

                      {/* Criterios */}
                      {CRITERIA.map(c => {
                        const max    = getMax(c);
                        const type   = CRIT_TYPE[c];
                        const raw    = row[c] ?? "";
                        const grade  = toGrade(raw, c);
                        const contrib = toContrib(raw, c);
                        const gradeColor = grade !== null
                          ? (grade>=7?"#51cf66":grade>=6?"#ffd43b":"#ff6b6b")
                          : "#3d3d60";

                        // ── MODO LECTURA ──
                        if (!isEditing) {
                          return (
                            <td key={c} style={{...TD,padding:"7px 5px"}}>
                              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
                                {/* Valor principal */}
                                <span style={{fontSize:14,fontWeight:700,color:gradeColor}}>
                                  {raw !== "" ? (
                                    type === "pct_directo"
                                      ? `${raw}%`
                                      : max
                                        ? `${raw}/${max}`
                                        : parseFloat(raw).toFixed(1)
                                  ) : "–"}
                                </span>
                                {/* Contribución al promedio */}
                                {contrib !== null && (
                                  <span style={{fontSize:10,color:gradeColor,opacity:.8}}>
                                    {contrib.toFixed(1)}% de {w[c]}%
                                  </span>
                                )}
                              </div>
                            </td>
                          );
                        }

                        // ── MODO EDICIÓN ──
                        const inputMax  = type === "pct_directo" ? w[c] : (max || undefined);
                        const inputStep = type === "pct_directo" ? 0.5 : 1;
                        const inputW    = 58;
                        const unitLabel = type === "cantidad" ? `/${max||"?"}` : type === "reactivos" ? `/${max||"?"}` : "%";

                        return (
                          <td key={c} style={{...TD,padding:"5px 3px"}}>
                            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                              <div style={{display:"flex",alignItems:"center",gap:2}}>
                                <input
                                  type="number"
                                  min={0}
                                  max={inputMax}
                                  step={inputStep}
                                  value={raw}
                                  onChange={e => setVal(s.id, c, e.target.value)}
                                  placeholder="–"
                                  style={{
                                    width: inputW,
                                    background:"#0d0d1a",
                                    border:`2px solid ${col.accent}88`,
                                    borderRadius:6, color:"#fff",
                                    padding:"6px 4px", fontSize:14, fontWeight:700,
                                    textAlign:"center", outline:"none",
                                  }}/>
                                <span style={{fontSize:11,color:col.accent,fontWeight:600}}>{unitLabel}</span>
                              </div>
                              {/* Preview contribución */}
                              {contrib !== null && (
                                <div style={{fontSize:10,fontWeight:700,color:gradeColor}}>
                                  = {contrib.toFixed(1)}% <span style={{color:"#5050a0",fontWeight:400}}>de {w[c]}%</span>
                                </div>
                              )}
                              {/* Advertencia sin max configurado */}
                              {type !== "pct_directo" && !max && raw === "" && (
                                <div style={{fontSize:9,color:"#ffd43b"}}>sin máx.</div>
                              )}
                            </div>
                          </td>
                        );
                      })}

                      {/* Promedio */}
                      <td style={{...TD,fontWeight:800,minWidth:65}}>
                        {avg !== null
                          ? <span style={{color:avg>=7?"#51cf66":avg>=6?"#ffd43b":"#ff6b6b",fontSize:15}}>
                              {avg.toFixed(1)} <Badge value={avg}/>
                            </span>
                          : <span style={{color:"#3d3d60"}}>–</span>
                        }
                      </td>

                      {/* Acciones */}
                      <td style={{...TD,padding:"4px 4px",width:100}}>
                        {!isEditing ? (
                          /* BOTÓN EDITAR */
                          <button onClick={()=>startEdit(s.id)}
                            title="Editar calificaciones de este alumno"
                            style={{
                              background:`linear-gradient(135deg,${col.bg},${col.bg})`,
                              border:`1px solid ${col.accent}66`,
                              borderRadius:6,color:col.accent,cursor:"pointer",
                              padding:"5px 10px",fontSize:12,fontWeight:700,
                              display:"flex",alignItems:"center",gap:4,
                              transition:"all .15s",whiteSpace:"nowrap"
                            }}
                            onMouseOver={e=>{e.currentTarget.style.background=col.bg;e.currentTarget.style.borderColor=col.accent;}}
                            onMouseOut={e=>{e.currentTarget.style.borderColor=col.accent+"66";}}>
                            ✏️ Editar
                          </button>
                        ) : (
                          /* BOTONES GUARDAR / CANCELAR */
                          <div style={{display:"flex",gap:4}}>
                            <button onClick={()=>saveRow(s.id)}
                              title="Guardar esta fila"
                              style={{
                                background:"linear-gradient(135deg,#1e6f3e,#27a356)",
                                border:"none",borderRadius:6,color:"#fff",
                                cursor:"pointer",padding:"5px 10px",fontSize:12,fontWeight:700,
                                transition:"opacity .15s"
                              }}
                              onMouseOver={e=>e.currentTarget.style.opacity=".85"}
                              onMouseOut={e=>e.currentTarget.style.opacity="1"}>
                              ✓ OK
                            </button>
                            <button onClick={()=>cancelEdit(s.id)}
                              title="Cancelar edición"
                              style={{
                                background:"#1a1a2e",border:"1px solid #2d2d4e",
                                borderRadius:6,color:"#7070a0",cursor:"pointer",
                                padding:"5px 8px",fontSize:12,transition:"all .15s"
                              }}
                              onMouseOver={e=>{e.currentTarget.style.borderColor="#ff6b6b44";e.currentTarget.style.color="#ff6b6b";}}
                              onMouseOut={e=>{e.currentTarget.style.borderColor="#2d2d4e";e.currentTarget.style.color="#7070a0";}}>
                              ✕
                            </button>
                            <button onClick={()=>setConfirmClear(s.id)}
                              title="Borrar calificaciones"
                              style={{
                                background:"#1a1a2e",border:"1px solid #2d2d4e",
                                borderRadius:6,color:"#5050a0",cursor:"pointer",
                                padding:"5px 7px",fontSize:11,transition:"all .15s"
                              }}
                              onMouseOver={e=>{e.currentTarget.style.borderColor="#ff6b6b44";e.currentTarget.style.color="#ff6b6b";}}
                              onMouseOut={e=>{e.currentTarget.style.borderColor="#2d2d4e";e.currentTarget.style.color="#5050a0";}}>
                              🗑
                            </button>
                          </div>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Fórmula */}
          <Card style={{marginTop:12,background:"#12122a",borderColor:"#4361ee22",padding:"8px 14px"}}>
            <div style={{fontSize:11,color:"#6060a0",marginBottom:6,fontWeight:600}}>📐 Fórmula de cálculo aplicada</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
              {CRITERIA.map(c=>{
                const type = CRIT_TYPE[c];
                const max  = getMax(c);
                return (
                  <div key={c} style={{background:"#0d0d1a",borderRadius:6,padding:"6px 10px",fontSize:11}}>
                    <div style={{color:col.accent,fontWeight:700,marginBottom:2}}>{C_ICONS[c]} {C_LABELS[c]} ({w[c]}%)</div>
                    <div style={{color:"#8080b0"}}>
                      {type === "cantidad"    && (max ? `cantidad ÷ ${max} × ${w[c]}%` : "configura el total en 🎯 Aciertos")}
                      {type === "reactivos"   && (max ? `aciertos ÷ ${max} × ${w[c]}%` : "configura reactivos en 🎯 Aciertos")}
                      {type === "pct_directo" && `docente asigna % directo (0–${w[c]}%)`}
                    </div>
                  </div>
                );
              })}
            </div>
          </Card>

          <div style={{marginTop:12,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <Btn onClick={saveAll}>💾 Guardar todo — {subject} · Bimestre {bimestre}</Btn>
            {dirty
              ? <span style={{fontSize:12,color:"#ffd43b"}}>● Filas con cambios pendientes</span>
              : <span style={{fontSize:12,color:"#51cf6688"}}>✓ Todo guardado</span>
            }
          </div>
        </>
      )}

      {/* Confirm clear */}
      {confirmClear && (() => {
        const st = students.find(x=>x.id===confirmClear);
        return (
          <div style={{position:"fixed",inset:0,background:"#000b",display:"flex",
            alignItems:"center",justifyContent:"center",zIndex:200}}>
            <Card style={{maxWidth:340,textAlign:"center",padding:24}}>
              <div style={{fontSize:32,marginBottom:10}}>🗑️</div>
              <div style={{fontWeight:700,marginBottom:8}}>¿Limpiar calificaciones?</div>
              <div style={{color:"#a0a0c0",fontSize:13,marginBottom:20}}>
                Se borrarán los valores de <strong>{st?.name}</strong> para{" "}
                <strong>{subject} · Bimestre {bimestre}</strong>.<br/>
                <span style={{color:"#ffd43b",fontSize:12}}>Presiona ✓ OK después para guardar el cambio.</span>
              </div>
              <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                <Btn onClick={()=>clearStudent(confirmClear)} variant="danger">Sí, limpiar</Btn>
                <Btn onClick={()=>setConfirmClear(null)} variant="secondary">Cancelar</Btn>
              </div>
            </Card>
          </div>
        );
      })()}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════ */
/*  TAB: VALORES / PORCENTAJES  (solo Master Admin)              */
/* ══════════════════════════════════════════════════════════════ */
function TabPesos({config, weights, totals, onSave, onSaveTotals, showToast}) {
  const [subject, setSubject] = useState(SUBJECTS[0]);
  const [localW,  setLocalW]  = useState({});
  const bims = Array.from({length:config.numBimestres},(_,i)=>i+1);

  useEffect(()=>{
    const init={};
    bims.forEach(b=>{ init[b]={...(weights[`${subject}-${b}`]||DEF_W)}; });
    setLocalW(init);
  },[subject,config.numBimestres,weights]);

  const setW    = (bim,crit,val) => setLocalW(p=>({...p,[bim]:{...p[bim],[crit]:parseInt(val)||0}}));
  const total   = bim => CRITERIA.reduce((s,c)=>s+(localW[bim]?.[c]||0),0);
  const col     = SUB_COLOR[subject];

  const savePesos = () => {
    const next={...weights};
    bims.forEach(b=>{ next[`${subject}-${b}`]=localW[b]; });
    onSave(next); showToast(`Porcentajes de ${subject} guardados ✓`);
  };

  const copyB1 = () => {
    const base=localW[1]||DEF_W; const next={};
    bims.forEach(b=>{ next[b]={...base}; });
    setLocalW(next); showToast("Bim.1 copiado a todos ✓");
  };

  return (
    <div>
      <h2 style={{marginBottom:6,fontSize:18}}>⚖️ Porcentajes de Evaluación</h2>
      <p style={{color:"#7070a0",fontSize:13,marginBottom:16}}>Define el peso de cada criterio por materia y bimestre. La suma debe ser exactamente 100%.</p>

      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        {SUBJECTS.map(sub=>{
          const c=SUB_COLOR[sub];
          return (
            <button key={sub} onClick={()=>setSubject(sub)} style={{
              padding:"8px 18px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:14,
              background:subject===sub?c.bg:"#1a1a2e",
              border:subject===sub?`2px solid ${c.accent}`:"2px solid #2d2d4e",
              color:subject===sub?c.accent:"#7070a0",
            }}>{sub}</button>
          );
        })}
      </div>

      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        <Btn onClick={copyB1} variant="secondary">📋 Copiar Bim.1 a todos</Btn>
        <Btn onClick={()=>{ const n={}; bims.forEach(b=>{n[b]={...DEF_W};}); setLocalW(n); showToast("Valores restablecidos"); }} variant="secondary">🔄 Restablecer</Btn>
        <Btn onClick={savePesos}>💾 Guardar {subject}</Btn>
      </div>

      <div style={{display:"grid",gap:12,gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))"}}>
        {bims.map(b=>{
          const t=total(b); const ok=t===100;
          return (
            <Card key={b} style={{border:`1px solid ${ok?col.accent+"44":"#ff6b6b44"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <span style={{fontWeight:700,color:col.accent}}>Bimestre {b}</span>
                <span style={{fontSize:12,fontWeight:700,color:ok?"#51cf66":"#ff6b6b"}}>{ok?"✓ 100%":`⚠️ ${t}%`}</span>
              </div>
              {CRITERIA.map(c=>(
                <div key={c} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <span style={{fontSize:12,width:88,color:"#c0c0e0",flexShrink:0}}>{C_ICONS[c]} {C_LABELS[c]}</span>
                  <input type="range" min={0} max={100} value={localW[b]?.[c]??0}
                    onChange={e=>setW(b,c,e.target.value)} style={{flex:1,accentColor:col.accent}}/>
                  <input type="number" min={0} max={100} value={localW[b]?.[c]??0}
                    onChange={e=>setW(b,c,e.target.value)}
                    style={{width:48,background:"#1a1a2e",border:"1px solid #2d2d4e",borderRadius:5,
                      color:col.accent,padding:"4px 5px",fontSize:13,textAlign:"center",fontWeight:700,outline:"none"}}/>
                  <span style={{fontSize:11,color:"#5050a0"}}>%</span>
                </div>
              ))}
              <div style={{height:5,background:"#1a1a2e",borderRadius:3,overflow:"hidden",marginTop:8,display:"flex"}}>
                {CRITERIA.map((c,ci)=>{
                  const bc=["#4dabf7","#51cf66","#ffd43b","#ff6b6b"];
                  return <div key={c} style={{width:`${localW[b]?.[c]??0}%`,background:bc[ci],transition:"width .2s"}}/>;
                })}
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}
